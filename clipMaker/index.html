<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClipMaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ["Sora", "ui-sans-serif", "sans-serif"],
                        body: ["Manrope", "ui-sans-serif", "sans-serif"]
                    },
                    boxShadow: {
                        soft: "0 10px 30px -18px rgba(15, 23, 42, 0.35), 0 6px 18px -12px rgba(14, 116, 144, 0.25)",
                        lift: "0 30px 80px -30px rgba(15, 23, 42, 0.45), 0 14px 30px -20px rgba(14, 116, 144, 0.35)"
                    }
                }
            }
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-a: #f2f6fb;
            --bg-b: #f8fbff;
            --ink-900: #0f172a;
            --ink-500: #64748b;
            --line: rgba(148, 163, 184, 0.24);
            --glass: rgba(255, 255, 255, 0.62);
        }

        html,
        body {
            min-height: 100%;
            background: radial-gradient(circle at 8% 0%, #ffffff 0%, transparent 40%),
                        radial-gradient(circle at 90% 18%, #dbeafe 0%, transparent 28%),
                        linear-gradient(145deg, var(--bg-a), var(--bg-b));
            color: var(--ink-900);
        }

        body {
            font-family: "Manrope", ui-sans-serif, sans-serif;
        }

        .grain::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.2;
            background-image: radial-gradient(rgba(148, 163, 184, 0.35) 0.5px, transparent 0.5px);
            background-size: 3px 3px;
            z-index: 0;
        }
    </style>
</head>
<body class="grain antialiased">
    <div class="relative z-10">
        <header class="fixed inset-x-0 top-0 z-20 px-4 py-4 sm:px-8">
            <nav class="mx-auto flex w-full max-w-7xl items-center justify-between rounded-2xl border border-white/40 bg-white/45 px-5 py-3 shadow-soft backdrop-blur-md">
                <span class="font-display text-sm font-bold tracking-tight text-slate-900 sm:text-base">ClipMaker AI</span>
                <span id="status" class="rounded-full border border-slate-200/70 bg-white/70 px-3 py-1 text-xs font-semibold text-slate-600 transition-colors duration-300">Pronto para iniciar</span>
            </nav>
        </header>

        <main class="px-4 pb-24 pt-36 sm:px-8 sm:pt-40 lg:pb-32">
            <section class="mx-auto w-full max-w-7xl py-24 lg:py-28">
                <div class="grid grid-cols-1 gap-8 lg:grid-cols-12">
                    <article class="group relative col-span-1 overflow-hidden rounded-3xl border border-white/60 bg-[var(--glass)] p-8 shadow-soft backdrop-blur-md transition duration-300 hover:scale-[1.02] hover:shadow-lift sm:p-10 lg:col-span-5 xl:p-12">
                        <div class="pointer-events-none absolute -right-8 -top-8 h-28 w-28 rounded-full bg-cyan-200/50 blur-2xl"></div>
                        <div class="pointer-events-none absolute -bottom-10 -left-10 h-36 w-36 rounded-full bg-sky-100/60 blur-2xl"></div>

                        <p class="mb-4 inline-flex items-center gap-2 rounded-full border border-cyan-200/70 bg-cyan-50/70 px-3 py-1 text-xs font-bold text-cyan-700">
                            <i data-lucide="sparkles" class="h-3.5 w-3.5"></i>
                            Viral Clip Engine
                        </p>

                        <h1 class="font-display text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl lg:text-5xl">ClipMaker</h1>
                        <p class="mt-4 max-w-xl text-sm font-medium text-slate-500 sm:text-base">
                            Envie um video para o Cloudinary, deixe a IA encontrar o melhor trecho e assista ao corte final automaticamente.
                        </p>

                        <div class="mt-10 space-y-5">
                            <label for="apiKey" class="block text-sm font-bold tracking-tight text-slate-900">API Key Gemini</label>
                            <div class="relative">
                                <i data-lucide="key-round" class="pointer-events-none absolute left-4 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"></i>
                                <input
                                    id="apiKey"
                                    type="password"
                                    placeholder="Cole sua chave de API do Gemini"
                                    autocomplete="off"
                                    spellcheck="false"
                                    class="w-full rounded-2xl border border-slate-200/80 bg-white/85 py-4 pl-12 pr-4 text-sm font-medium text-slate-800 shadow-sm outline-none transition duration-300 placeholder:text-slate-400 focus:border-cyan-400 focus:ring-4 focus:ring-cyan-100"
                                >
                            </div>

                            <button
                                id="uploadWidget"
                                type="button"
                                class="inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-slate-900 px-5 py-4 font-semibold text-white shadow-soft transition duration-300 hover:scale-[1.02] hover:bg-slate-800 hover:shadow-lift focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-slate-300"
                            >
                                <i data-lucide="upload" class="h-4 w-4"></i>
                                Upload e Gerar Momento Viral
                            </button>
                        </div>
                    </article>

                    <article class="group relative col-span-1 overflow-hidden rounded-3xl border border-white/60 bg-[var(--glass)] p-6 shadow-soft backdrop-blur-md transition duration-300 hover:scale-[1.02] hover:shadow-lift sm:p-8 lg:col-span-7 xl:p-10">
                        <div class="absolute right-4 top-4 rounded-full border border-slate-200/80 bg-white/80 px-3 py-1 text-[11px] font-bold uppercase tracking-wide text-slate-500">
                            Preview
                        </div>
                        <div class="mt-8 overflow-hidden rounded-2xl border border-slate-200/70 bg-slate-950/95 shadow-sm">
                            <video
                                id="video"
                                class="aspect-video h-auto w-full"
                                controls
                                preload="metadata"
                                playsinline
                            ></video>
                        </div>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <script src="https://upload-widget.cloudinary.com/latest/global/all.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        const el = {
            status: document.getElementById("status"),
            video: document.getElementById("video"),
            button: document.getElementById("uploadWidget"),
            apiKey: document.getElementById("apiKey")
        };

        const config = {
            cloudName: "dcq0maxgt",
            uploadPreset: "upload_nlw"
        };

        const app = {
            publicId: "",

            setStatus(message, tone = "neutral") {
                el.status.textContent = message;
                el.status.className = "rounded-full border px-3 py-1 text-xs font-semibold transition-colors duration-300";

                if (tone === "loading") {
                    el.status.classList.add("border-amber-200", "bg-amber-50", "text-amber-700");
                    return;
                }

                if (tone === "success") {
                    el.status.classList.add("border-emerald-200", "bg-emerald-50", "text-emerald-700");
                    return;
                }

                if (tone === "error") {
                    el.status.classList.add("border-rose-200", "bg-rose-50", "text-rose-700");
                    return;
                }

                el.status.classList.add("border-slate-200/70", "bg-white/70", "text-slate-600");
            },

            async sleep(ms) {
                return new Promise(function (resolve) {
                    setTimeout(resolve, ms);
                });
            },

            transcriptionCandidates() {
                const id = encodeURIComponent(this.publicId);
                return [
                    `https://res.cloudinary.com/${config.cloudName}/video/upload/sp_auto/${id}.transcript`,
                    `https://res.cloudinary.com/${config.cloudName}/video/upload/sp_auto/${id}.txt`,
                    `https://res.cloudinary.com/${config.cloudName}/video/upload/${id}.transcript`,
                    `https://res.cloudinary.com/${config.cloudName}/video/upload/${id}.txt`
                ];
            },

            async getTranscription() {
                const maxAttempts = 24;
                const delayMs = 3000;
                const urls = this.transcriptionCandidates();

                for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
                    for (const url of urls) {
                        try {
                            const response = await fetch(url, { method: "GET" });
                            if (response.ok) {
                                const text = (await response.text()).trim();
                                if (text.length > 32) {
                                    return text;
                                }
                            }
                        } catch (_error) {
                        }
                    }

                    this.setStatus(`Aguardando transcricao (${attempt}/${maxAttempts})`, "loading");
                    await this.sleep(delayMs);
                }

                throw new Error("Transcricao nao encontrada no Cloudinary dentro do tempo esperado.");
            },

            normalizeMoment(rawText) {
                const cleaned = rawText
                    .replace(/```/g, "")
                    .replace(/json/gi, "")
                    .replace(/\s+/g, "")
                    .trim();

                const match = cleaned.match(/so_\d+(?:\.\d+)?,eo_\d+(?:\.\d+)?/i);
                if (!match) {
                    throw new Error("Formato invalido retornado pela IA.");
                }
                return match[0].toLowerCase();
            },

            async getViralMoment(transcription) {
                const model = "gemini-2.0-flash";
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

                const prompt = [
                    "Role: You are a professional video editor specializing in viral content.",
                    "Task: Analyze the transcription and identify the best segment.",
                    "Constraints:",
                    "1) Duration: 30 to 60 seconds.",
                    "2) Return only Cloudinary format: so_<start>,eo_<end>.",
                    "3) No markdown, no quotes, no explanations.",
                    `Transcription: ${transcription}`
                ].join("\n");

                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: {
                        "x-goog-api-key": el.apiKey.value.trim(),
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [
                                    { text: prompt }
                                ]
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`Gemini falhou com status ${response.status}.`);
                }

                const data = await response.json();
                const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
                return this.normalizeMoment(raw);
            },

            getClipUrl(moment) {
                return `https://res.cloudinary.com/${config.cloudName}/video/upload/${moment}/${encodeURIComponent(this.publicId)}.mp4`;
            },

            async processUpload(info) {
                this.publicId = info.public_id;
                this.setStatus("Upload concluido. Processando IA...", "loading");

                const transcription = await this.getTranscription();
                this.setStatus("Transcricao pronta. Encontrando melhor corte...", "loading");

                const moment = await this.getViralMoment(transcription);
                const clipUrl = this.getClipUrl(moment);

                el.video.src = clipUrl;
                el.video.load();
                this.setStatus("Clip viral gerado com sucesso.", "success");

                gsap.fromTo("#video", { opacity: 0.35, scale: 0.98 }, { opacity: 1, scale: 1, duration: 0.8, ease: "power2.out" });
            }
        };

        const widget = cloudinary.createUploadWidget(
            {
                cloudName: config.cloudName,
                uploadPreset: config.uploadPreset,
                resourceType: "video",
                multiple: false,
                sources: ["local", "url", "camera"],
                folder: "clipmaker",
                clientAllowedFormats: ["mp4", "mov", "webm", "m4v"],
                maxFileSize: 500000000,
                showAdvancedOptions: false,
                styles: {
                    palette: {
                        window: "#F8FBFF",
                        windowBorder: "#CBD5E1",
                        tabIcon: "#0F172A",
                        menuIcons: "#0F172A",
                        textDark: "#0F172A",
                        textLight: "#FFFFFF",
                        link: "#0369A1",
                        action: "#0F172A",
                        inactiveTabIcon: "#64748B",
                        error: "#BE123C",
                        inProgress: "#B45309",
                        complete: "#15803D",
                        sourceBg: "#FFFFFF"
                    }
                }
            },
            async function (error, result) {
                if (error) {
                    app.setStatus("Erro no upload do Cloudinary.", "error");
                    return;
                }

                if (!result || result.event !== "success") {
                    return;
                }

                try {
                    await app.processUpload(result.info);
                } catch (processError) {
                    app.setStatus(processError.message || "Falha ao gerar clip.", "error");
                }
            }
        );

        el.button.addEventListener("click", function () {
            if (!el.apiKey.value.trim()) {
                app.setStatus("Insira sua API Key do Gemini para continuar.", "error");
                el.apiKey.focus();
                return;
            }

            app.setStatus("Aguardando upload de video...", "loading");
            widget.open();
        });

        lucide.createIcons();

        gsap.from("header nav", {
            opacity: 0,
            y: -24,
            duration: 0.8,
            ease: "power2.out"
        });

        gsap.from("main article", {
            opacity: 0,
            y: 36,
            duration: 0.9,
            stagger: 0.12,
            ease: "power2.out"
        });
    </script>
</body>
</html>
