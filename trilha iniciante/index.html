<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
</head>
<body>

    <h1>ClipMaker</h1>

    <button id="upload_widget" class="cloudinary-button">Upload files</button>

    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>  

    <script type="text/javascript">

    const app = {
        transcriptionURL: "",
        public_id: '',
        waitForTranscription: async () => {
            const maxAttempts = 30;
            const delayMs = 2000; // 2 segundos entre tentativas
            let attempts = 0;

            while (attempts < maxAttempts) {
                try {
                    const url = `https://res.cloudinary.com/${config.cloudName}/video/upload/v${app.transcriptionURL}/${app.public_id}.mp4`;
                    
                    const response = await fetch(url, { method: 'HEAD' });
                    
                    if (response.ok) {
                        console.log('Transcrição pronta!');
                        return true;
                    }
                } catch (error) {
                    console.log(`Tentativa ${attempts + 1}/${maxAttempts}: Aguardando transcrição...`);
                }
                
                attempts++;
                
                if (attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, delayMs));
                }
            }

            console.log('Timeout: transcrição não ficou pronta após 30 tentativas');
            return false; 
        },

        getTranscription: async () => {
            const response = await fetch(app.transcriptionURL)
            return response.text()
        },
        getViralMoment: async () => {
            const transcription = await app.getTranscription()
            const model = 'gemini-3-flash-preview'
            const endpointGemini = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`

            const prompt = ''
            const headers = {
                'x-goog-api-key': '$GEMINI_API_KEY',
                'Content-Type': 'application/json'
            }

            const contents = [
                {
                    parts: [
                        {
                            text: ""
                        }
                    ]
                }
            ]

            const response = await fetch(endpointGemini, {
                method: 'POST',
                headers,
                body: JSON.stringify({ contents })
            })

            const data = await response.json()
            console.log({data})
        }

    }

    const config = {
        cloudName: 'dcq0maxgt',
        uploadPreset: 'upload_nlw'
    } 

    const myWidget = cloudinary.createUploadWidget(
      config,
      (error, result) => { 
      if (!error && result && result.event === "success") { 
         console.log('Done! Here is the image info: ', result.info); 
        }
      }
    )

    document.getElementById("upload_widget").addEventListener("click", function(){
          myWidget.open();
    }, false);
</script>
    
</body>
</html>
